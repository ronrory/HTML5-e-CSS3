<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 e CSS3 - One Page Site</title>
    <meta name="description"
        content="Aprenda HTML5, CSS3 e SEO de forma simples, prática e objetiva desenvolvendo passo a passo do zero até a hospedagem um site one page moderno e responsivo.">
    <link rel="icon" href="img/favicon.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- cabeçalho -->
    <header id="inicio">
        <div class="Conteiner Flex">
            <div id="Logo">
                <img src="img/logo 2.png" alt="hal 9000">
            </div>
            <nav>
                <input type="checkbox" id="check">
                <label for="check">&#x268c;</label>
                <ul>
                    <li><a href="#inicio">Inicio</a></li>
                    <li><a href="#sobre">Sobre</a></li>
                    <li><a href="#conteudo">Conteudo</a></li>
                    <li><a href="#contato">Contato</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Main -->
    <main>
        <div class="Conteiner">
            <h1>HTML5 e CSS3</h1>
            <h2>Voce faz. Voce ve. Voce aprende</h2>
        </div>
    </main>

    <!-- Sobre -->
    <section id="sobre">
        <div class="Conteiner">
            <h2>Aprender na Pratica</h2>
        </div>
    </section>

    <!-- One page -->
    <section>
        <div class="Conteiner">
            <h2>One Page Site</h2>
        </div>
    </section>

    <!-- Wireframe -->
    <section>
        <div class="Conteiner">
            <h2>Wireframe</h2>
        </div>
    </section>

    <!-- Conteudo -->
    <section id="conteudo">
        <div class="Conteiner">
            <h2>Conteudo</h2>
            <h3>HTML5</h3>
            <h3>BOX MODEL CSS</h3>
            <h3>BREAKPOINTS</h3>
        </div>
    </section>

    <!-- Rodape -->
    <footer id="contato">
        <div class="Conteiner">
        </div>
    </footer>
    <a href="#inicio" id="topo"><img src="img/topo.png" alt="topo do site"></a>
</body>

</html>
